name: Train Model

on:
  schedule:
    # Domingo 2am UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Descargar datos de entrenamiento desde S3
        run: |
          mkdir -p data
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/${{ vars.S3_DATA_KEY || 'curated/citibike_trips/citibike_curated.snappy.parquet' }} data/datos.parquet

      - name: Entrenar modelo
        run: python -m ml.train --input data/datos.parquet
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_MODEL_PREFIX: ${{ vars.S3_MODEL_PREFIX || 'models/' }}
